<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center">

  <div class="w-full max-w-lg px-6">

    <!-- Title -->
    <h1 class="text-white text-4xl font-bold mb-1">Admin Login</h1>

    <!-- Red underline + divider -->
    <div class="flex items-center mb-2">
      <div class="h-0.5 w-10 bg-red-600"></div>
      <div class="h-px flex-1 bg-white/20 ml-0"></div>
    </div>

    <!-- Subtitle -->
    <p class="text-white text-xs font-semibold mb-8">Login to access the dashboard</p>

    {% if messages %}
        {% for message in messages %}
            <p class="bg-red-500/10 border border-red-500 text-red-400 text-sm px-4 py-3 rounded mb-4">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %} 
        <!-- Name Field -->
        <div class="mb-5">
        <label class="block text-white text-xs mb-2">Email</label>
        <input
            for="email"            
            name="email"
            type="email"
            required
            class="w-full bg-[#1c1c1c] border border-white/10 rounded text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors placeholder-transparent"
        />
        </div>

        <!-- Password Field -->
        <div class="mb-7">
        <label class="block text-white text-xs mb-2">Password</label>
        <div class="relative">
            <input
            for="password"
            type="password"
            name="password"
            required
            id="password"
            class="w-full bg-[#1c1c1c] border border-white/10 rounded text-white text-sm px-4 py-4 pr-12 outline-none focus:border-white/30 transition-colors"
            />
            <button
            type="button"
            onclick="togglePassword()"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/70 transition-colors"
            >
            <!-- Eye icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12z"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            </button>
        </div>
        </div>

        <!-- Login Button -->
        <button
        class="w-full bg-white text-black font-bold text-sm tracking-widest py-5 rounded hover:bg-gray-100 active:scale-[0.99] transition-all duration-150"
        type="submit"
        >
        LOGIN
        </button>

    </form>
    
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    document.querySelector("form").addEventListener("submit", function() {
    const btn = document.getElementById("loginBtn");
    btn.innerText = "Logging in...";
    btn.disabled = true;
    });
  </script>
</body>
</html>
