{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASHIO – Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Share Tech Mono', monospace; }
    input[type="checkbox"] { accent-color: #fff; }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- ── NAVBAR ── -->
  <header class="bg-[#1a1a1a] border-b border-white/10 flex items-center justify-between px-6 h-14">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 bg-white flex items-center justify-center rounded-sm">
        <span class="text-black font-black text-xs leading-none">✕</span>
      </div>
      <span class="mono text-white text-base font-bold tracking-widest">FASHIO</span>
    </div>
    <a href="{% url 'user_login' %}" ><button class="mono text-xs tracking-widest px-5 py-2 bg-white text-black font-bold hover:bg-gray-100 transition-colors rounded-sm">
      LOGIN
    </button></a>
  </header>

  <!-- ── MAIN ── -->
  <main class="flex-1 flex items-start justify-center px-6 pt-16 pb-16">
    <div class="w-full max-w-md">

      <!-- Label + Title -->
      <p class="mono text-white/50 text-xs tracking-widest mb-2">New Account</p>
      <h1 class="text-white text-3xl font-bold mb-1">Join FASHIO</h1>
      <div class="flex items-center mb-8">
        <div class="h-0.5 w-10 bg-red-600"></div>
        <div class="h-px flex-1 bg-white/15"></div>
      </div>

      {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
                <div class="text-red-500 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <!-- Full Name -->
        <div class="mb-5">
            <label class="block text-white text-xs mb-2">Full Name</label>
            <input type="text" name="name"
            class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"/>
        </div>

        <!-- Email Address -->
        <div class="mb-5">
            <label class="block text-white text-xs mb-2">Email Address</label>
            <input type="email" name="email"
            class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"/>
        </div>

        <!-- Password + Confirm Password (2-col) -->
        <div class="grid grid-cols-2 gap-4 mb-5">
            <div>
            <label class="block text-white text-xs mb-2">password</label>
            <input type="password" name="password1"
                class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"/>
            </div>
            <div>
            <label class="block text-white text-xs mb-2">Confirm password</label>
            <input type="password" name="password2"
                class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"/>
            </div>
        </div>

        <!-- Referral Code -->
        <div class="mb-6">
            <label class="block text-white text-xs mb-2">Referral Code (Optional)</label>
            <input type="text" name="referral_code"
            class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"/>
        </div>

        <!-- Terms checkbox -->
        <div class="flex items-center gap-3 mb-8">
            <input type="checkbox" id="terms" name="terms"
            class="w-4 h-4 bg-[#1c1c1c] border border-white/20 rounded-sm cursor-pointer"/>
            <label for="terms" class="text-white/60 text-xs cursor-pointer">
            I agree to the <a href="#" class="text-white underline underline-offset-2 hover:text-white/80">Terms</a>
            and <a href="#" class="text-white underline underline-offset-2 hover:text-white/80">Privacy Policy</a>
            </label>
        </div>

        <!-- JOIN NOW button -->
        <button class="w-full bg-white text-black mono font-bold text-sm tracking-widest py-5 flex items-center justify-center gap-3 hover:bg-gray-100 active:scale-[0.99] transition-all duration-150 mb-6"
            type="submit"
            >
            JOIN NOW
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-6">
        <div class="flex-1 h-px bg-white/15"></div>
        <span class="mono text-[10px] tracking-widest text-white/40 border border-white/15 px-3 py-1">OR CONTINUE WITH</span>
        <div class="flex-1 h-px bg-white/15"></div>
      </div>

      <a href="{% provider_login_url 'google' %}">
      <!-- Google button -->
        <button class="w-full bg-black border border-white/25 hover:bg-white/5 active:scale-[0.99] transition-all py-4 flex items-center justify-center gap-3 mb-8">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="mono text-sm tracking-widest text-white/70">GOOGLE</span>
        </button>
      </a>

      <!-- Divider line -->
      <div class="h-px bg-white/10 mb-6"></div>

      <!-- Sign in link -->
      <p class="text-center text-sm text-white/40 mb-1">Already have an account?</p>
      <p class="text-center">
        <a href="{% url 'user_login' %}" class="text-white text-sm font-semibold hover:underline">Sign in</a>
      </p>

    </div>
  </main>

</body>
</html>
