<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FASHIO{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #000; color: #fff; }
    .mono  { font-family: 'Share Tech Mono', monospace; }
    .bebas { font-family: 'Bebas Neue', sans-serif; }
    .text-outline { -webkit-text-stroke: 2px rgba(255,255,255,0.18); color: transparent; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track { animation: marquee 14s linear infinite; }
    .card-hover { transition: transform .2s, box-shadow .2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.6); }
    .cat-panel { position: relative; overflow: hidden; cursor: pointer; }
    .cat-panel img { transition: transform .5s ease; }
    .cat-panel:hover img { transform: scale(1.04); }
    .cat-panel::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%); }
    .cat-label { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; }
    .nav-icon { transition: color 0.15s; }
    .nav-icon:hover { color: #fff; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen">

<nav class="fixed top-0 left-0 right-0 z-50 bg-[#111] border-b border-white/10 flex items-center justify-between px-6 h-14">
  <div class="flex items-center gap-2.5 shrink-0">
    <div class="w-7 h-7 bg-white flex items-center justify-center rounded-sm">
      <span class="text-black font-black text-xs leading-none">✕</span>
    </div>
    <span class="mono text-white text-base font-bold tracking-widest">FASHIO</span>
  </div>

  <div class="hidden md:flex items-center gap-8">
    <a href="/" class="mono text-xs tracking-widest text-white border-b border-red-600 pb-0.5">HOME</a>
    <a href="#" class="mono text-xs tracking-widest text-white/50 hover:text-white transition-colors">SHOP</a>
    <a href="#" class="mono text-xs tracking-widest text-white/50 hover:text-white transition-colors">ABOUT</a>
    <a href="#" class="mono text-xs tracking-widest text-white/50 hover:text-white transition-colors">CONTACT</a>
  </div>

  <div class="flex items-center gap-4">

    <div class="relative hidden sm:block">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3 h-3 text-white/30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" placeholder="Search" class="mono bg-[#1c1c1c] border border-white/10 text-white text-xs pl-8 pr-3 py-2 w-32 outline-none focus:border-white/30 transition-colors placeholder-white/25 rounded-sm"/>
    </div>

    <button class="nav-icon text-white/50 p-1">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
      </svg>
    </button>

    <button class="nav-icon text-white/50 p-1 relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
      </svg>
    </button>

    <a href="{% url 'user_profile' %}">
      <button class="nav-icon text-white/50 p-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </button>
    </a>

  </div>
</nav>

<main>
    {% block content %}
    {% endblock %}
</main>


{% block scripts %}
{% endblock %}

</body>
</html>
