<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASHIO – Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Share Tech Mono', monospace; }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- ── NAVBAR ── -->
  <header class="bg-[#1a1a1a] border-b border-white/10 flex items-center px-6 h-14">
    <div class="flex items-center gap-2.5">
      <div class="w-7 h-7 bg-white flex items-center justify-center rounded-sm">
        <span class="text-black font-black text-xs leading-none">✕</span>
      </div>
      <span class="mono text-white text-base font-bold tracking-widest">FASHIO</span>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-xl">

      <!-- Title -->
      <h1 class="text-white text-4xl font-bold mb-1">Forgot your Password?</h1>
      <div class="flex items-center mb-6">
        <div class="h-0.5 w-12 bg-red-600"></div>
        <div class="h-px flex-1 bg-white/15"></div>
      </div>

      <!-- Subtitle -->
      <p class="mono text-white/50 text-xs tracking-wide mb-8">
        Enter your email associated with your account
      </p>

      <!-- Email Address -->
      <form method="POST">
        {% csrf_token %}
        <div class="mb-5">
          <label class="block text-white text-xs font-semibold mb-2">Email Address</label>
          <input
            type="email"
            name="email"
            required
            class="w-full bg-[#1c1c1c] border border-white/10 rounded-sm text-white text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"
          />
        </div>

        <!-- SENT OTP button -->
        <button class="w-full bg-white text-black mono font-bold text-sm tracking-widest py-5 flex items-center justify-center gap-3 hover:bg-gray-100 active:scale-[0.99] transition-all duration-150 mb-8"
        type="submit"
        >
          SENT OTP
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
          </svg>
        </button>
      </form>

      <!-- Back to Login -->
      <p class="text-center text-sm text-white/40">
        Back to <a href="#" class="text-white font-bold hover:underline">Login</a>
      </p>

    </div>
  </main>

</body>
</html>
