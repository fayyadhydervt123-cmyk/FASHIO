<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}FASHIO{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #000; }
    .mono  { font-family: 'Share Tech Mono', monospace; }
    .bebas { font-family: 'Bebas Neue', sans-serif; }
    .text-outline { -webkit-text-stroke: 2px rgba(255,255,255,0.18); color: transparent; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .marquee-track { animation: marquee 14s linear infinite; }
    .card-hover { transition: transform .2s, box-shadow .2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.6); }
    .cat-panel { position: relative; overflow: hidden; cursor: pointer; }
    .cat-panel img { transition: transform .5s ease; }
    .cat-panel:hover img { transform: scale(1.04); }
    .cat-panel::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 55%); }
    .cat-label { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; }
    .nav-icon { transition: color 0.15s; }
    nav { transition: background .3s, border-color .3s; }
    .nav-icon:hover { color: #000; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen">

<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md border-b border-black/10 flex items-center justify-between px-6 h-14">

  <div class="flex items-center gap-2.5 shrink-0">

    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="6" width="9" height="2.5" fill="black"/>
      <rect x="6" y="6" width="2.5" height="15" fill="black"/>
      <rect x="6" y="13" width="7" height="2.5" fill="black"/>
    </svg>

    <a href="{% url 'user_loggedin_dashboard' %}" 
      class="mono text-black text-base font-bold tracking-widest">
      FASHIO
    </a>
  </div>

  <div class="hidden md:flex items-center gap-8">

  <a href="{% url 'user_loggedin_dashboard' %}"
     class="mono text-xs tracking-widest transition-colors
     {% if request.resolver_match.url_name == 'user_loggedin_dashboard' %}
       text-black border-b border-black pb-0.5
     {% else %}
       text-black/50 hover:text-black
     {% endif %}">
    HOME
  </a>

  <a href="{% url 'product_list' %}"
     class="mono text-xs tracking-widest transition-colors
     {% if request.resolver_match.url_name == 'product_list' or request.resolver_match.url_name == 'product_detail' %}
       text-black border-b border-black pb-0.5
     {% else %}
       text-black/50 hover:text-black
     {% endif %}">
    SHOP
  </a>

  <a href="#"
     class="mono text-xs tracking-widest text-black/50 hover:text-black transition-colors">
    ABOUT
  </a>

  <a href="#"
     class="mono text-xs tracking-widest text-black/50 hover:text-black transition-colors">
    CONTACT
  </a>

</div>

  <div class="flex items-center gap-4">

  <!-- Wishlist Icon -->
  <a href="{% url 'wishlist_page' %}"
     class="relative p-1 text-black/50 hover:text-black transition-colors"
     title="Wishlist">
    <svg class="w-5 h-5"
         fill="none"
         stroke="currentColor"
         stroke-width="1.7"
         viewBox="0 0 24 24">
      <path stroke-linecap="round"
            stroke-linejoin="round"
            d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733C11.285 4.876 9.623 3.75 7.688 3.75 5.099 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
    </svg>

    <span id="wishlist-notification-badge"
        class="{% if request.session.wishlist_notification_count %}
                 flex
               {% else %}
                 hidden
               {% endif %}
               absolute -top-1 -right-1 min-w-4 h-4 px-1 items-center justify-center rounded-full bg-black text-white mono text-[9px]">
    {% if request.session.wishlist_notification_count %}
      {{ request.session.wishlist_notification_count }}
    {% endif %}
  </span>
  </a>

  <!-- Cart Icon -->
 <a href="{% url 'cart_page' %}"
   class="relative p-1 text-black/50 hover:text-black transition-colors"
   title="Cart">

  <svg class="w-5 h-5"
       fill="none"
       stroke="currentColor"
       stroke-width="1.7"
       viewBox="0 0 24 24">
    <path stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12A1.125 1.125 0 0119.75 21.75H4.25a1.125 1.125 0 01-1.119-1.243l1.263-12A1.125 1.125 0 015.513 7.5h12.974a1.125 1.125 0 011.119 1.007z"/>
  </svg>

  <span id="cart-notification-badge"
        class="absolute -top-1 -right-1 min-w-4 h-4 px-1 bg-black text-white mono text-[9px] items-center justify-center rounded-full
        {% if request.session.cart_notification_count %}
          flex
        {% else %}
          hidden
        {% endif %}">
    {{ request.session.cart_notification_count }}
  </span>
</a>

  <!-- Profile Icon -->
  <a href="{% url 'user_profile' %}"
     class="p-1 text-black/50 hover:text-black transition-colors"
     title="Profile">
    <svg class="w-5 h-5"
         fill="none"
         stroke="currentColor"
         stroke-width="1.5"
         viewBox="0 0 24 24">
      <path stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
    </svg>
  </a>

</div>
</nav>

<main class="pt-14">
    {% block content %}
    {% endblock %}
</main>

<script>
  const nav = document.getElementById('navbar');

  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) {
      nav.style.background = 'rgba(255,255,255,0.95)';
      nav.style.borderBottomColor = 'rgba(0,0,0,0.1)';
    } else {
      nav.style.background = 'rgba(255,255,255,0.9)';
      nav.style.borderBottomColor = 'rgba(0,0,0,0.1)';
    }
  });
</script>

{% block scripts %}
{% endblock %}

</body>


</html>
