<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASHIO – Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Share Tech Mono', monospace; }
  </style>
</head>
<body class="bg-white text-white min-h-screen flex flex-col">

  <!-- ── NAVBAR ── -->
  <header class="bg-white border-b border-black/10 flex items-center px-6 h-14">
    <div class="flex items-center gap-2.5">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="9" height="2.5" fill="black"/>
        <rect x="6" y="6" width="2.5" height="15" fill="black"/>
        <rect x="6" y="13" width="7" height="2.5" fill="black"/>
      </svg>
      <span class="mono text-black text-base font-bold tracking-widest">FASHIO</span>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-xl">

      <!-- Title -->
      <h1 class="text-black text-4xl font-bold mb-1">Forgot your Password?</h1>
      <div class="flex items-center mb-6">
        <div class="h-0.5 w-12 bg-black"></div>
        <div class="h-px flex-1 bg-black/15"></div>
      </div>

      <!-- Subtitle -->
      <p class="mono text-black/50 text-xs tracking-wide mb-8">
        Enter your email associated with your account
      </p>

      {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="text-red-500 text-sm">
                {{ message }}
            </div>
            {% endfor %}
        </div>
      {% endif %}

      <!-- Email Address -->
      <form method="POST">
        {% csrf_token %}
        <div class="mb-5">
          <label class="block text-black text-xs font-semibold mb-2">Email Address</label>
          <input
            type="email"
            name="email"
            required
            class="w-full bg-[#f5f5f5] border border-black/10 rounded-sm text-black text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"
          />
        </div>

        <!-- SENT OTP button -->
        <button class="w-full bg-black/70 text-white mono font-bold text-sm tracking-widest py-5 flex items-center justify-center gap-3 hover:bg-black active:scale-[0.99] transition-all duration-150 mb-8"
        type="submit"
        >
          SENT OTP
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
          </svg>
        </button>
      </form>

      <!-- Back to Login -->
      <p class="text-center text-sm text-black/40">
        Back to <a href="#" class="text-black font-bold hover:underline">Login</a>
      </p>

    </div>
  </main>

</body>
</html>
