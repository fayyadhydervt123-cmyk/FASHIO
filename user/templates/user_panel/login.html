{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FASHIO – Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Share Tech Mono', monospace; }
  </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col">

  <!-- ── NAVBAR ── -->
  <header class="bg-white border-b border-black/10 flex items-center justify-between px-6 h-14">
    <div class="flex items-center gap-3">
      <span class="font-serif italic font-black text-black text-xl tracking-tight" style="transform: skewX(-8deg); display: inline-block;">FASHIO</span>
    </div>
    <a href="{% url 'user_signup' %}" ><button class="mono text-xs tracking-widest px-5 py-2 bg-black/70 text-white font-bold hover:bg-black transition-colors">
      SIGN UP
    </button></a>
  </header>

  <!-- ── MAIN ── -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-md">

      <!-- Title -->
      <h1 class="text-black text-3xl font-bold mb-1">Welcome Back</h1>
      <div class="flex items-center mb-7">
        <div class="h-0.5 w-10 bg-black"></div>
        <div class="h-px flex-1 bg-black/15"></div>
      </div>


      {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="text-red-500 text-sm">
                {{ message }}
            </div>
            {% endfor %}
        </div>
      {% endif %}


      <form method='POST'>
        {% csrf_token %}
      <!-- Email -->
        <div class="mb-5">
            <label class="block text-black text-xs mb-2">Email address</label>
            <input
            type="email"
            name="email"
            value="{{ form_data.email|default:'' }}"
            class="w-full bg-[#f5f5f5] border border-black/10 rounded-sm text-black text-sm px-4 py-4 outline-none focus:border-white/30 transition-colors"
            />
        </div>

        <!-- Password -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-2">
            <label class="text-black text-xs">Password</label>
            <a href="{% url 'user_forgot_password' %}" class="text-black text-xs font-bold hover:underline">Forgot Password?</a>
            </div>
            <div class="relative">
            <input
                type="password"
                name="password"
                id="password"
                class="w-full bg-[#f5f5f5] border border-black/10 rounded-sm text-black text-sm px-4 py-4 pr-12 outline-none focus:border-white/30 transition-colors"
            />
            <button
                type="button"
                onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-black/40 hover:text-black/70 transition-colors"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12C3.75 7.5 7.5 4.5 12 4.5s8.25 3 9.75 7.5c-1.5 4.5-5.25 7.5-9.75 7.5S3.75 16.5 2.25 12z"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                </svg>
            </button>
            </div>
        </div>
      

            <!-- Sign In Button -->
            <button type="submit" class="w-full bg-black/70 text-white mono font-bold text-sm tracking-widest py-5 hover:bg-black active:scale-[0.99] transition-all duration-150 mb-7">
                SIGN IN
            </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-7">
        <div class="flex-1 h-px bg-black/15"></div>
        <span class="mono text-[10px] tracking-widest text-black/40 border border-white/10 px-3 py-1">OR CONTINUE WITH</span>
        <div class="flex-1 h-px bg-black/15"></div>
      </div>

      <a href="{% provider_login_url 'google' %}">
      <!-- Google Button -->
        <button class="w-full bg-white border border-black/20 hover:bg-black/5 active:scale-[0.99] transition-all py-4 flex items-center justify-center gap-3 mb-8">
            <!-- Google G icon -->
            <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="mono text-sm tracking-widest text-black/70">GOOGLE</span>
        </button>
      </a>

      <!-- Sign Up Link -->
      <p class="text-center text-sm text-black/40">
        Dont have an account ?
        <a href="{% url 'user_signup' %}" class="text-black font-semibold ml-1 hover:underline">Sign Up</a>
      </p>

    </div>
  </main>

</body>
</html>
